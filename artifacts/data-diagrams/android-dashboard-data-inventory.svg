<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Android dashboard data inventory</title>
  <desc id="desc">Android UsageStats and opt-in location metadata flow through Room and WorkManager sync DTOs into PostgreSQL and the integrated Blazor dashboard.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 30px Segoe UI, Arial, sans-serif; }
      .subtitle { fill: #475569; font: 15px Segoe UI, Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .android { fill: #ecfdf5; stroke: #86efac; }
      .room { fill: #eff6ff; stroke: #93c5fd; }
      .sync { fill: #eef2ff; stroke: #a5b4fc; }
      .server { fill: #fff7ed; stroke: #fdba74; }
      .privacy { fill: #fff1f2; stroke: #fda4af; }
      .label { fill: #0f172a; font: 700 18px Segoe UI, Arial, sans-serif; }
      .small { fill: #475569; font: 14px Segoe UI, Arial, sans-serif; }
      .tiny { fill: #64748b; font: 12px Segoe UI, Arial, sans-serif; }
      .code { fill: #1f2937; font: 12px Consolas, monospace; }
      .line { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .softline { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />
  <text class="title" x="48" y="56">Android Dashboard Data Inventory</text>
  <text class="subtitle" x="48" y="84">Metadata-only Android categories that can feed the integrated PostgreSQL + Blazor dashboard.</text>

  <rect class="panel android" x="45" y="130" width="280" height="170" />
  <text class="label" x="70" y="166">UsageStats collection</text>
  <text class="small" x="70" y="198">UsageEvents resumed/paused</text>
  <text class="small" x="70" y="222">UsageSessionizer intervals</text>
  <text class="small" x="70" y="246">Noise packages filtered</text>
  <text class="small" x="70" y="270">UTC start/end + local date</text>

  <rect class="panel android" x="45" y="360" width="280" height="180" />
  <text class="label" x="70" y="396">Opt-in location</text>
  <text class="small" x="70" y="428">Off by default</text>
  <text class="small" x="70" y="452">Foreground permission gated</text>
  <text class="small" x="70" y="476">Nullable coordinates</text>
  <text class="small" x="70" y="500">Rounded visit summaries</text>

  <rect class="panel room" x="410" y="115" width="300" height="240" />
  <text class="label" x="438" y="153">Room: woong-monitor.db</text>
  <text class="code" x="438" y="188">focus_sessions</text>
  <text class="small" x="438" y="211">package, duration, localDate</text>
  <text class="code" x="438" y="242">location_context_snapshots</text>
  <text class="small" x="438" y="265">permission, capture mode, coords?</text>
  <text class="code" x="438" y="296">location_visits</text>
  <text class="small" x="438" y="319">duration, samples, map points</text>

  <rect class="panel room" x="410" y="415" width="300" height="155" />
  <text class="label" x="438" y="453">Local Android UI</text>
  <text class="small" x="438" y="485">Dashboard: active, idle, top app</text>
  <text class="small" x="438" y="509">Sessions/App Detail: rows + hourly</text>
  <text class="small" x="438" y="533">Report: 7d/30d/90d/custom</text>
  <text class="small" x="438" y="557">Location context and visits</text>

  <rect class="panel sync" x="790" y="130" width="270" height="170" />
  <text class="label" x="818" y="166">sync_outbox</text>
  <text class="code" x="818" y="200">focus_session JSON</text>
  <text class="code" x="818" y="224">location_context JSON</text>
  <text class="small" x="818" y="255">Pending/Failed retry queue</text>
  <text class="small" x="818" y="279">Payload path only, not analytics</text>

  <rect class="panel sync" x="790" y="360" width="270" height="180" />
  <text class="label" x="818" y="396">WorkManager sync DTOs</text>
  <text class="small" x="818" y="428">AndroidSyncWorker</text>
  <text class="small" x="818" y="452">AndroidOutboxSyncProcessor</text>
  <text class="small" x="818" y="476">/api/focus-sessions/upload</text>
  <text class="small" x="818" y="500">/api/location-contexts/upload</text>
  <text class="tiny" x="818" y="526">X-Device-Token header only</text>

  <rect class="panel server" x="1125" y="145" width="230" height="180" />
  <text class="label" x="1150" y="182">PostgreSQL</text>
  <text class="small" x="1150" y="214">devices</text>
  <text class="small" x="1150" y="238">focus_sessions</text>
  <text class="small" x="1150" y="262">location_contexts</text>
  <text class="small" x="1150" y="286">app family mappings</text>

  <rect class="panel server" x="1125" y="390" width="230" height="150" />
  <text class="label" x="1150" y="427">Blazor dashboard</text>
  <text class="small" x="1150" y="459">Platform totals</text>
  <text class="small" x="1150" y="483">Top apps and reports</text>
  <text class="small" x="1150" y="507">Coarse location state</text>

  <rect class="panel privacy" x="95" y="645" width="1210" height="150" />
  <text class="label" x="125" y="686">Privacy and evidence boundary</text>
  <text class="small" x="125" y="720">Sync is opt-in and off by default. Location is opt-in and permission-gated. Device tokens are never dashboard content.</text>
  <text class="small" x="125" y="748">No typed text, passwords, messages, form input, clipboard, page contents, screenshots, full URLs, or Android touch coordinates.</text>
  <text class="small" x="125" y="776">Emulator evidence captures Woong UI and Room/process assertions only; no Chrome screenshots or other-app UI dumps.</text>

  <path class="line" d="M325 215 C360 215 375 210 410 205" />
  <path class="line" d="M325 450 C360 450 375 280 410 280" />
  <path class="softline" d="M560 355 L560 415" />
  <path class="line" d="M710 220 C750 220 760 215 790 215" />
  <path class="line" d="M710 285 C760 300 760 445 790 450" />
  <path class="line" d="M1060 450 C1090 420 1100 260 1125 245" />
  <path class="line" d="M1240 325 L1240 390" />

  <text class="tiny" x="355" y="198">persist</text>
  <text class="tiny" x="735" y="205">serialize</text>
  <text class="tiny" x="1082" y="430">upload</text>
  <text class="tiny" x="1252" y="365">query</text>
</svg>
