<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">WPF dashboard data inventory pipeline</title>
  <desc id="desc">Windows WPF local metadata pipeline from foreground and browser capture through SQLite, sync DTOs, PostgreSQL, and the integrated Blazor dashboard.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .lane { fill: #ffffff; stroke: #c8d0dc; stroke-width: 2; rx: 12; }
      .box { fill: #fdfefe; stroke: #34495e; stroke-width: 1.6; rx: 8; }
      .source { fill: #eaf6ff; stroke: #2b6cb0; }
      .store { fill: #eefaf0; stroke: #2f855a; }
      .sync { fill: #fff7e6; stroke: #b7791f; }
      .server { fill: #f3efff; stroke: #6b46c1; }
      .dash { fill: #fff0f3; stroke: #b83280; }
      .privacy { fill: #fff5f5; stroke: #c53030; }
      .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
      .laneTitle { font: 700 18px Arial, sans-serif; fill: #263342; }
      .h { font: 700 15px Arial, sans-serif; fill: #17202a; }
      .t { font: 13px Arial, sans-serif; fill: #25313d; }
      .small { font: 12px Arial, sans-serif; fill: #3e4c59; }
      .arrow { stroke: #435466; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#435466" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="900" />
  <text class="title" x="40" y="48">Windows/WPF Data Inventory For Integrated Blazor Dashboard</text>
  <text class="small" x="40" y="74">Metadata-only pipeline: Windows local collection - SQLite - sync DTO/API - PostgreSQL - integrated dashboard aggregates</text>

  <rect class="lane" x="35" y="105" width="300" height="650" />
  <text class="laneTitle" x="55" y="135">Windows WPF Client</text>

  <rect class="box source" x="60" y="165" width="250" height="105" />
  <text class="h" x="80" y="192">Foreground/runtime state</text>
  <text class="t" x="80" y="218">process, pid, hwnd</text>
  <text class="t" x="80" y="240">UTC sample time</text>
  <text class="t" x="80" y="262">idle vs active</text>

  <rect class="box source" x="60" y="295" width="250" height="120" />
  <text class="h" x="80" y="322">Browser metadata</text>
  <text class="t" x="80" y="348">domain and browser family</text>
  <text class="t" x="80" y="370">capture method/confidence</text>
  <text class="t" x="80" y="392">native message or UI fallback</text>

  <rect class="box privacy" x="60" y="440" width="250" height="120" />
  <text class="h" x="80" y="467">Privacy/settings</text>
  <text class="t" x="80" y="493">sync opt-in, local DB path</text>
  <text class="t" x="80" y="515">window title hidden</text>
  <text class="t" x="80" y="537">domain-only URL storage</text>

  <rect class="box source" x="60" y="585" width="250" height="115" />
  <text class="h" x="80" y="612">Sessionizers + WPF UI</text>
  <text class="t" x="80" y="638">FocusSessionizer</text>
  <text class="t" x="80" y="660">BrowserWebSessionizer</text>
  <text class="t" x="80" y="682">cards, rows, charts, live status</text>

  <rect class="lane" x="380" y="105" width="300" height="650" />
  <text class="laneTitle" x="400" y="135">Windows Local SQLite</text>

  <rect class="box store" x="405" y="165" width="250" height="115" />
  <text class="h" x="425" y="192">focus_session</text>
  <text class="t" x="425" y="218">client_session_id, device_id</text>
  <text class="t" x="425" y="240">app/process, UTC range</text>
  <text class="t" x="425" y="262">duration, idle, timezone</text>

  <rect class="box store" x="405" y="305" width="250" height="115" />
  <text class="h" x="425" y="332">web_session</text>
  <text class="t" x="425" y="358">focus_session_id, domain</text>
  <text class="t" x="425" y="380">browser family, UTC range</text>
  <text class="t" x="425" y="402">method, confidence, private flag</text>

  <rect class="box store" x="405" y="445" width="250" height="105" />
  <text class="h" x="425" y="472">browser_raw_event</text>
  <text class="t" x="425" y="498">source evidence only</text>
  <text class="t" x="425" y="520">30 day local retention</text>

  <rect class="box store" x="405" y="575" width="250" height="125" />
  <text class="h" x="425" y="602">sync_outbox</text>
  <text class="t" x="425" y="628">aggregate_type/id</text>
  <text class="t" x="425" y="650">payload_json</text>
  <text class="t" x="425" y="672">pending, failed, synced</text>

  <rect class="lane" x="725" y="105" width="270" height="650" />
  <text class="laneTitle" x="745" y="135">Sync DTO + API</text>

  <rect class="box sync" x="750" y="205" width="220" height="120" />
  <text class="h" x="770" y="232">Focus upload</text>
  <text class="t" x="770" y="258">UploadFocusSessionsRequest</text>
  <text class="t" x="770" y="280">FocusSessionUploadItem[]</text>
  <text class="t" x="770" y="302">/api/focus-sessions/upload</text>

  <rect class="box sync" x="750" y="365" width="220" height="120" />
  <text class="h" x="770" y="392">Web upload</text>
  <text class="t" x="770" y="418">UploadWebSessionsRequest</text>
  <text class="t" x="770" y="440">WebSessionUploadItem[]</text>
  <text class="t" x="770" y="462">/api/web-sessions/upload</text>

  <rect class="box privacy" x="750" y="525" width="220" height="110" />
  <text class="h" x="770" y="552">Auth boundary</text>
  <text class="t" x="770" y="578">X-Device-Token</text>
  <text class="t" x="770" y="600">secret, not dashboard data</text>

  <rect class="lane" x="1040" y="105" width="220" height="650" />
  <text class="laneTitle" x="1060" y="135">PostgreSQL</text>

  <rect class="box server" x="1065" y="190" width="170" height="95" />
  <text class="h" x="1085" y="217">devices</text>
  <text class="t" x="1085" y="243">platform windows</text>
  <text class="t" x="1085" y="265">timezone, last seen</text>

  <rect class="box server" x="1065" y="325" width="170" height="95" />
  <text class="h" x="1085" y="352">focus_sessions</text>
  <text class="t" x="1085" y="378">Windows app time</text>
  <text class="t" x="1085" y="400">active/idle totals</text>

  <rect class="box server" x="1065" y="460" width="170" height="95" />
  <text class="h" x="1085" y="487">web_sessions</text>
  <text class="t" x="1085" y="513">domain totals</text>
  <text class="t" x="1085" y="535">browser totals</text>

  <rect class="box server" x="1065" y="595" width="170" height="85" />
  <text class="h" x="1085" y="622">query aggregates</text>
  <text class="t" x="1085" y="648">UTC in storage</text>
  <text class="t" x="1085" y="670">timezone at query/UI</text>

  <rect class="lane" x="1305" y="105" width="160" height="650" />
  <text class="laneTitle" x="1325" y="135">Blazor</text>

  <rect class="box dash" x="1325" y="200" width="120" height="100" />
  <text class="h" x="1340" y="227">Totals</text>
  <text class="t" x="1340" y="253">active</text>
  <text class="t" x="1340" y="275">idle, web</text>

  <rect class="box dash" x="1325" y="335" width="120" height="100" />
  <text class="h" x="1340" y="362">Charts</text>
  <text class="t" x="1340" y="388">apps</text>
  <text class="t" x="1340" y="410">domains</text>

  <rect class="box dash" x="1325" y="470" width="120" height="105" />
  <text class="h" x="1340" y="497">Details</text>
  <text class="t" x="1340" y="523">sessions</text>
  <text class="t" x="1340" y="545">devices</text>
  <text class="t" x="1340" y="567">platforms</text>

  <path class="arrow" d="M310 218 H405" />
  <path class="arrow" d="M310 360 H405" />
  <path class="arrow dashed" d="M310 360 C350 380 360 480 405 495" />
  <path class="arrow" d="M530 280 V305" />
  <path class="arrow" d="M530 420 V575" />
  <path class="arrow" d="M655 638 H750" />
  <path class="arrow" d="M970 265 H1065" />
  <path class="arrow" d="M970 425 H1065" />
  <path class="arrow" d="M1235 635 H1325" />

  <rect class="box privacy" x="40" y="790" width="1425" height="70" />
  <text class="h" x="60" y="818">Privacy exclusions</text>
  <text class="t" x="60" y="843">Do not expose keystrokes, passwords, messages, form input, clipboard, screenshots, page contents, full URLs, query strings, page titles, window titles, or device tokens without explicit future policy and opt-in.</text>
</svg>
