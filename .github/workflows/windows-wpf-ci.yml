name: Windows WPF CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows-wpf:
    name: Build, test, publish, and package Windows WPF app
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      WINDOWS_MSIX_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_MSIX_CERTIFICATE_BASE64 }}
      WINDOWS_MSIX_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_MSIX_CERTIFICATE_PASSWORD }}
      HAS_WINDOWS_MSIX_RELEASE_CERTIFICATE: ${{ secrets.WINDOWS_MSIX_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_MSIX_CERTIFICATE_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Woong.MonitorStack.sln --configfile NuGet.config

      - name: Build Release
        run: dotnet build Woong.MonitorStack.sln -c Release --no-restore -m:1 -v minimal

      - name: Test Release
        run: dotnet test Woong.MonitorStack.sln -c Release --no-build -m:1 -v minimal

      - name: Publish Windows app
        run: dotnet publish src\Woong.MonitorStack.Windows.App\Woong.MonitorStack.Windows.App.csproj -c Release --no-restore -o artifacts\windows-app

      - name: Decode release MSIX signing certificate
        if: env.HAS_WINDOWS_MSIX_RELEASE_CERTIFICATE == 'true'
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\woong-monitor-msix-signing.pfx",
            [Convert]::FromBase64String($env:WINDOWS_MSIX_CERTIFICATE_BASE64))

      - name: Package signed MSIX with release certificate
        if: env.HAS_WINDOWS_MSIX_RELEASE_CERTIFICATE == 'true'
        shell: pwsh
        run: .\scripts\package-windows-msix.ps1 -Configuration Release -SkipPublish -Sign -CertificatePath $env:RUNNER_TEMP\woong-monitor-msix-signing.pfx -CertificatePassword $env:WINDOWS_MSIX_CERTIFICATE_PASSWORD

      - name: Package signed MSIX with ephemeral test certificate
        if: env.HAS_WINDOWS_MSIX_RELEASE_CERTIFICATE != 'true'
        shell: pwsh
        run: .\scripts\package-windows-msix.ps1 -Configuration Release -SkipPublish -CreateTestCertificate

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-windows-app
          path: artifacts/windows-app/**

      - name: Upload Windows MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-windows-msix
          path: |
            artifacts/windows-msix/*.msix
            artifacts/windows-msix/certificates/*.cer
            artifacts/windows-msix/install-windows-msix.ps1
            artifacts/windows-msix/README.md
