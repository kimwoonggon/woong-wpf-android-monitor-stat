name: Server CI

on:
  push:
    branches:
      - main
    paths:
      - "src/Woong.MonitorStack.Server/**"
      - "tests/Woong.MonitorStack.Server.Tests/**"
      - "docs/server-test-db-strategy.md"
      - "docs/production-migrations.md"
      - ".github/workflows/server-ci.yml"
      - "scripts/validate-server-ci-workflow.ps1"
  pull_request:
    branches:
      - main
    paths:
      - "src/Woong.MonitorStack.Server/**"
      - "tests/Woong.MonitorStack.Server.Tests/**"
      - "docs/server-test-db-strategy.md"
      - "docs/production-migrations.md"
      - ".github/workflows/server-ci.yml"
      - "scripts/validate-server-ci-workflow.ps1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    name: Restore, build, test, and publish ASP.NET Core server
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate workflow contract
        shell: pwsh
        run: scripts/validate-server-ci-workflow.ps1 -WorkflowPath .github/workflows/server-ci.yml

      - name: Restore server tests
        run: dotnet restore tests\Woong.MonitorStack.Server.Tests\Woong.MonitorStack.Server.Tests.csproj --configfile NuGet.config

      - name: Build server
        run: dotnet build src\Woong.MonitorStack.Server\Woong.MonitorStack.Server.csproj -c Release --no-restore -m:1 -v minimal

      - name: Test server
        run: dotnet test tests\Woong.MonitorStack.Server.Tests\Woong.MonitorStack.Server.Tests.csproj -c Release --no-restore -m:1 -v minimal

      - name: Publish server
        run: dotnet publish src\Woong.MonitorStack.Server\Woong.MonitorStack.Server.csproj -c Release --no-restore -o artifacts\server

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-server
          path: artifacts/server/**
