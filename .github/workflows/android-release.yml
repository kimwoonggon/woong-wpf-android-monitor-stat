name: Android Release

on:
  push:
    tags:
      - "v*"
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-release:
    name: Build, test, sign, and publish Android release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      WOONG_ANDROID_PRODUCTION_SYNC_BASE_URL: ${{ vars.WOONG_ANDROID_PRODUCTION_SYNC_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Android release workflow contract
        shell: pwsh
        run: scripts/validate-android-release-workflow.ps1 -WorkflowPath .github/workflows/android-release.yml

      - name: Fail when Android release signing secrets are missing
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS) -or
              [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_PASSWORD)) {
            throw "Android releases require ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
          }

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build and test Android release candidates
        run: ./gradlew testDebugUnitTest assembleDebug assembleRelease assembleDebugAndroidTest --no-daemon --stacktrace
        working-directory: android

      - name: Decode Android signing keystore
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP/android-release-keystore.jks",
            [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

      - name: Sign Android release APK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/android-release | Out-Null
          $buildTools = Join-Path $env:ANDROID_HOME "build-tools/36.0.0"
          $zipalign = Join-Path $buildTools "zipalign"
          $apksigner = Join-Path $buildTools "apksigner"
          $unsigned = "android/app/build/outputs/apk/release/app-release-unsigned.apk"
          $aligned = "$env:RUNNER_TEMP/android-release-aligned.apk"
          $signed = "artifacts/android-release/woong-monitor-android-release-signed.apk"

          & $zipalign -f -p 4 $unsigned $aligned
          & $apksigner sign `
            --ks "$env:RUNNER_TEMP/android-release-keystore.jks" `
            --ks-pass "pass:$env:ANDROID_KEYSTORE_PASSWORD" `
            --ks-key-alias "$env:ANDROID_KEY_ALIAS" `
            --key-pass "pass:$env:ANDROID_KEY_PASSWORD" `
            --out $signed `
            $aligned
          & $apksigner verify --verbose $signed

      - name: Write Android release readiness manifest
        shell: pwsh
        run: |
          $signed = "artifacts/android-release/woong-monitor-android-release-signed.apk"
          $readiness = "artifacts/android-release/release-readiness.json"
          $gradleFile = Get-Content -Raw -Path "android/app/build.gradle.kts"
          $versionCode = [regex]::Match($gradleFile, "versionCode\s*=\s*(\d+)").Groups[1].Value
          $versionName = [regex]::Match($gradleFile, "versionName\s*=\s*`"([^`"]+)`"").Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($versionCode) -or [string]::IsNullOrWhiteSpace($versionName)) {
            throw "Could not read Android versionCode/versionName from android/app/build.gradle.kts."
          }

          $manifest = [ordered]@{
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("O")
            gitRefName = "${{ github.ref_name }}"
            gitSha = "${{ github.sha }}"
            versionCode = [int]$versionCode
            versionName = $versionName
            signedApkFile = "woong-monitor-android-release-signed.apk"
            signedApkSha256 = (Get-FileHash -Algorithm SHA256 -Path $signed).Hash.ToLowerInvariant()
            productionSyncBaseUrlConfigured = -not [string]::IsNullOrWhiteSpace($env:WOONG_ANDROID_PRODUCTION_SYNC_BASE_URL)
            syncDefaultOptIn = $false
            playPublishingMode = "manual"
            emulatorEvidenceRequiredBeforePublicRelease = $true
          }

          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path $readiness -Encoding utf8
          Write-Host "Release readiness manifest: $readiness"

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-android-signed-apk-${{ github.ref_name }}
          path: |
            artifacts/android-release/woong-monitor-android-release-signed.apk
            artifacts/android-release/release-readiness.json
          if-no-files-found: error

      - name: Archive Android release artifacts
        shell: pwsh
        run: |
          $archivePath = "artifacts/woong-monitor-android-${{ github.ref_name }}.zip"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          Compress-Archive -Path artifacts/android-release/* -DestinationPath $archivePath
          Write-Host "Release archive: $archivePath"

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-android-release-${{ github.ref_name }}
          path: artifacts/woong-monitor-android-${{ github.ref_name }}.zip

      - name: Upload Android unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: woong-monitor-android-release-unit-test-report-${{ github.ref_name }}
          path: |
            android/app/build/reports/tests/testDebugUnitTest/**
            android/app/build/test-results/testDebugUnitTest/**

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/woong-monitor-android-${{ github.ref_name }}.zip
